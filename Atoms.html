<!DOCTYPE html>
<html>
<head>
<title>Atomic Detective</title>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
margin:0;
}

h1{
font-size:40px;
margin-top:20px;
}

#menu{
margin-top:40px;
}

.levelBtn{
padding:14px 25px;
font-size:18px;
margin:10px;
background:#00bcd4;
border:none;
border-radius:8px;
cursor:pointer;
}

.levelBtn:hover{
background:#0097a7;
}

#game{
display:none;
width:900px;
margin:auto;
margin-top:20px;
}

.panel{
background:rgba(0,0,0,0.35);
padding:18px;
border-radius:10px;
margin:10px;
}

button{
padding:10px 18px;
margin:8px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
}

.choice{
background:#3949ab;
color:white;
}

.choice:hover{
background:#5c6bc0;
}

.control{
background:#00897b;
color:white;
}

#atom{
position:relative;
width:220px;
height:220px;
margin:auto;
border-radius:50%;
border:2px solid #aaa;
}

.nucleus{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:50px;
height:50px;
background:#ff5252;
border-radius:50%;
}

.electron{
position:absolute;
width:12px;
height:12px;
background:#00e5ff;
border-radius:50%;
animation:orbit 5s linear infinite;
}

@keyframes orbit{
0%{transform:rotate(0deg) translateX(100px) rotate(0deg);}
100%{transform:rotate(360deg) translateX(100px) rotate(-360deg);}
}

.correct{
color:#8cff98;
font-weight:bold;
}

.wrong{
color:#ff7b7b;
font-weight:bold;
}

#stars{
font-size:40px;
margin-top:20px;
}

</style>
</head>

<body>

<h1>Atomic Detective</h1>

<div id="menu">

<h2>Select Game Level</h2>

<button class="levelBtn" onclick="startGame(1)">Level 1 Proton Finder</button>
<button class="levelBtn" onclick="startGame(2)">Level 2 Neutron Calculator</button>
<button class="levelBtn" onclick="startGame(3)">Level 3 Electron and Charge</button>
<button class="levelBtn" onclick="startGame(4)">Level 4 Atomic Notation Master</button>

</div>

<div id="game">

<div class="panel">
Level <span id="level"></span>
Score <span id="score">0</span>
Errors <span id="errors">0</span>
</div>

<div class="panel" id="question"></div>

<div id="choices"></div>

<div class="panel">

<button class="control" onclick="showClue()">Clue</button>
<button class="control" onclick="showAnswer()">Show Answer</button>
<button class="control" onclick="skipQuestion()">Skip</button>

</div>

<div id="atom">
<div class="nucleus"></div>
</div>

<div id="result"></div>

<div id="stars"></div>

</div>

<script>

let level=1
let score=0
let errors=0
let currentAtom={}
let correctAnswer=0

const elements=[
{symbol:"H",atomic:1},
{symbol:"He",atomic:2},
{symbol:"Li",atomic:3},
{symbol:"Be",atomic:4},
{symbol:"B",atomic:5},
{symbol:"C",atomic:6},
{symbol:"N",atomic:7},
{symbol:"O",atomic:8},
{symbol:"F",atomic:9},
{symbol:"Ne",atomic:10},
{symbol:"Na",atomic:11},
{symbol:"Mg",atomic:12},
{symbol:"Al",atomic:13},
{symbol:"Si",atomic:14},
{symbol:"P",atomic:15},
{symbol:"S",atomic:16},
{symbol:"Cl",atomic:17},
{symbol:"Ar",atomic:18}
]

function randomAtom(){

let e=elements[Math.floor(Math.random()*elements.length)]
let mass=e.atomic+Math.floor(Math.random()*15)+1
let charge=[-2,-1,0,1,2][Math.floor(Math.random()*5)]

return{
symbol:e.symbol,
atomic:e.atomic,
mass:mass,
charge:charge
}

}

function startGame(l){

level=l
score=0
errors=0

document.getElementById("menu").style.display="none"
document.getElementById("game").style.display="block"

document.getElementById("level").innerText=level

nextQuestion()

}

function nextQuestion(){

currentAtom=randomAtom()

document.getElementById("result").innerHTML=""
document.getElementById("stars").innerHTML=""

if(level==1){

correctAnswer=currentAtom.atomic

document.getElementById("question").innerHTML=
"Element symbol is <b>"+currentAtom.symbol+"</b>. The atomic number equals the number of protons in the nucleus. How many protons are in this atom?"

}

if(level==2){

correctAnswer=currentAtom.mass-currentAtom.atomic

document.getElementById("question").innerHTML=
"Atomic number is <b>"+currentAtom.atomic+"</b> and mass number is <b>"+currentAtom.mass+"</b>. Remember mass number equals protons plus neutrons. How many neutrons are present?"

}

if(level==3){

correctAnswer=currentAtom.atomic-currentAtom.charge

document.getElementById("question").innerHTML=
"The atomic number is <b>"+currentAtom.atomic+"</b>. The ion has a charge of <b>"+currentAtom.charge+"</b>. Calculate the number of electrons."

}

if(level==4){

correctAnswer=currentAtom.mass-currentAtom.atomic

document.getElementById("question").innerHTML=
"Atomic notation shown below. The top number is mass number and bottom is atomic number.<br><br><sup>"+currentAtom.mass+"</sup>"+currentAtom.symbol+"<sub>"+currentAtom.atomic+"</sub><br><br>Calculate the number of neutrons."

}

generateChoices()

drawElectrons()

}

function generateChoices(){

let html=""
let used=[]

for(let i=0;i<4;i++){

let val

do{
val=correctAnswer+Math.floor(Math.random()*10)-5
}while(val<0 || used.includes(val))

used.push(val)

html+="<button class='choice' onclick='check("+val+")'>"+val+"</button>"

}

document.getElementById("choices").innerHTML=html

}

function check(val){

if(val==correctAnswer){

score+=10
document.getElementById("result").innerHTML="<div class='correct'>Correct</div>"

}else{

errors++
document.getElementById("result").innerHTML="<div class='wrong'>Incorrect</div>"

}

updatePanel()

if(score>=50){

finishGame()
return
}

setTimeout(nextQuestion,1200)

}

function updatePanel(){

document.getElementById("score").innerText=score
document.getElementById("errors").innerText=errors

}

function showClue(){

let clue=""

if(level==1){
clue="Atomic number equals number of protons."
}

if(level==2){
clue="Neutrons equal mass number minus atomic number."
}

if(level==3){
clue="Positive charge means electrons lost. Negative means electrons gained."
}

if(level==4){
clue="Neutrons equal mass minus atomic number."
}

document.getElementById("result").innerHTML=clue

}

function showAnswer(){

document.getElementById("result").innerHTML="Answer is "+correctAnswer

}

function skipQuestion(){

errors++
nextQuestion()

}

function drawElectrons(){

let atom=document.getElementById("atom")

atom.querySelectorAll(".electron").forEach(e=>e.remove())

let n=Math.min(currentAtom.atomic,10)

for(let i=0;i<n;i++){

let e=document.createElement("div")

e.className="electron"
e.style.animationDuration=(3+Math.random()*4)+"s"

atom.appendChild(e)

}

}

function finishGame(){

let stars=""

if(errors<=2){
stars="⭐⭐⭐ Perfect"
}
else if(errors<=5){
stars="⭐⭐ Good"
}
else{
stars="⭐ Needs Practice"
}

document.getElementById("stars").innerHTML=stars

}

</script>

</body>
</html>
