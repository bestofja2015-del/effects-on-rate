<!DOCTYPE html>
<html>

<head>

<title>Atomic Detective</title>

<style>

body{
font-family:Segoe UI;
background:#0c1326;
color:white;
text-align:center;
}

h1{
color:#00e5ff;
}

#menu{
margin:20px;
}

.levelbtn{
background:#3949ab;
color:white;
padding:10px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

#game{
width:900px;
margin:auto;
}

.panel{
background:#1b2450;
padding:20px;
border-radius:10px;
margin:15px;
}

.choice{
background:#2636b0;
padding:12px;
margin:8px;
border-radius:6px;
cursor:pointer;
display:inline-block;
min-width:80px;
}

.choice:hover{
background:#4052ff;
}

.correct{
background:#0dbb4f !important;
}

.wrong{
background:#d12c2c !important;
}

button{
padding:10px;
margin:6px;
border:none;
border-radius:6px;
cursor:pointer;
}

.action{
background:#607d8b;
color:white;
}

#atom{
width:220px;
height:220px;
border:2px solid #6a6cff;
border-radius:50%;
margin:auto;
position:relative;
}

.nucleus{
width:40px;
height:40px;
background:#ff5252;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.electron{
width:10px;
height:10px;
background:#00ffff;
border-radius:50%;
position:absolute;
animation:orbit 4s linear infinite;
}

@keyframes orbit{
0%{transform:rotate(0deg) translateX(90px) rotate(0deg);}
100%{transform:rotate(360deg) translateX(90px) rotate(-360deg);}
}

#dragNumbers{
margin-top:20px;
}

.numtile{
display:inline-block;
background:#1976d2;
padding:8px;
margin:4px;
cursor:grab;
border-radius:4px;
}

.drop{
width:60px;
height:30px;
border:2px dashed white;
display:inline-block;
margin:4px;
}

table{
margin:auto;
}

</style>

</head>

<body>

<h1>Atomic Detective</h1>

<div id="menu">

<h3>Select Level</h3>

<button class="levelbtn" onclick="startLevel(1)">Level 1 Protons</button>
<button class="levelbtn" onclick="startLevel(2)">Level 2 Electrons</button>
<button class="levelbtn" onclick="startLevel(3)">Level 3 Neutrons</button>
<button class="levelbtn" onclick="startLevel(4)">Level 4 Charge</button>
<button class="levelbtn" onclick="startLevel(5)">Level 5 Atomic Notation</button>
<button class="levelbtn" onclick="startLevel(6)">Level 6 Table Challenge</button>

</div>

<div id="game" style="display:none">

<div class="panel">

Score <span id="score">0</span>
Errors <span id="errors">0</span>

</div>

<div class="panel" id="question"></div>

<div id="choices"></div>

<div>

<button class="action" onclick="checkAnswer()">Check Answer</button>
<button class="action" onclick="showAnswer()">Show Answer</button>
<button class="action" onclick="showClue()">Clue</button>
<button class="action" onclick="skip()">Skip</button>

</div>

<div id="atom">
<div class="nucleus"></div>
</div>

<div id="dragArea" style="display:none">

<h3>Complete the table</h3>

<table border="1">

<tr>
<th>Symbol</th>
<th>Protons</th>
<th>Neutrons</th>
<th>Electrons</th>
<th>Mass</th>
</tr>

<tr>
<td id="symbolCell"></td>
<td class="drop"></td>
<td class="drop"></td>
<td class="drop"></td>
<td class="drop"></td>
</tr>

</table>

<div id="dragNumbers"></div>

<button onclick="checkTable()">Check Table</button>

</div>

<div id="rating"></div>

</div>

<script>

let level=1
let score=0
let errors=0
let correctAnswer=0
let selected=null

const elements=[
{sym:"C",p:6,m:12},
{sym:"O",p:8,m:16},
{sym:"Na",p:11,m:23},
{sym:"Mg",p:12,m:24},
{sym:"Cl",p:17,m:35},
{sym:"Ne",p:10,m:20}
]

function startLevel(l){

level=l
score=0
errors=0

document.getElementById("menu").style.display="none"
document.getElementById("game").style.display="block"

next()

}

function randomElement(){

return elements[Math.floor(Math.random()*elements.length)]

}

function next(){

let e=randomElement()

let q=""
let options=[]

if(level==1){

q=e.sym+" has 6 electrons and mass 12. If neutral how many protons?"
correctAnswer=e.p

}

if(level==2){

q=e.sym+" is in group 8 period 2. How many electrons does it have?"
correctAnswer=e.p

}

if(level==3){

q=e.sym+" has mass "+e.m+" and atomic number "+e.p+". How many neutrons?"
correctAnswer=e.m-e.p

}

if(level==4){

q=e.sym+" has atomic number "+e.p+" and charge +1. How many electrons?"
correctAnswer=e.p-1

}

if(level==5){

q="In notation <sup>"+e.m+"</sup>"+e.sym+"<sub>"+e.p+"</sub> find protons"
correctAnswer=e.p

}

document.getElementById("question").innerHTML=q

generateChoices()

addElectrons(e.p)

}

function generateChoices(){

let html=""

let answers=[correctAnswer]

while(answers.length<4){

let n=correctAnswer+Math.floor(Math.random()*6)-3

if(n>0 && !answers.includes(n))answers.push(n)

}

answers.sort(()=>Math.random()-0.5)

answers.forEach(v=>{

html+="<div class='choice' onclick='selectChoice(this,"+v+")'>"+v+"</div>"

})

document.getElementById("choices").innerHTML=html

}

function selectChoice(el,val){

selected=val

document.querySelectorAll(".choice").forEach(b=>b.style.outline="none")

el.style.outline="3px solid yellow"

}

function checkAnswer(){

if(selected==null)return

let btns=document.querySelectorAll(".choice")

btns.forEach(b=>{

if(parseInt(b.innerText)==correctAnswer){
b.classList.add("correct")
}

if(parseInt(b.innerText)==selected && selected!=correctAnswer){
b.classList.add("wrong")
}

})

if(selected==correctAnswer){

score++

setTimeout(next,1200)

}else{

errors++

}

updateRating()

}

function showAnswer(){

alert("Correct answer is "+correctAnswer)

}

function showClue(){

alert("Remember atomic number equals protons")

}

function skip(){

errors++

next()

}

function addElectrons(n){

let atom=document.getElementById("atom")

atom.querySelectorAll(".electron").forEach(e=>e.remove())

for(let i=0;i<n;i++){

let e=document.createElement("div")

e.className="electron"

e.style.animationDuration=(3+Math.random()*3)+"s"

atom.appendChild(e)

}

}

function updateRating(){

let stars=""

if(errors==0)stars="⭐⭐⭐⭐⭐ Perfect"
else if(errors<=3)stars="⭐⭐⭐⭐ Good"
else if(errors<=7)stars="⭐⭐⭐ Basic Try Again"
else if(errors<=12)stars="⭐⭐ Needs Practice"
else stars="⭐ Fail"

document.getElementById("rating").innerHTML=stars

}

function buildDragNumbers(){

let html=""

for(let i=0;i<50;i++){

html+="<div draggable='true' class='numtile'>"+i+"</div>"

}

document.getElementById("dragNumbers").innerHTML=html

}

</script>

</body>

</html>
