<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f4f8;
margin:0;
padding:20px;
text-align:center;
}

h1{
font-size:40px;
margin-bottom:20px;
}

#gameArea{
display:flex;
justify-content:center;
align-items:flex-start;
gap:40px;
flex-wrap:wrap;
}

/* QUESTION */

#question{
font-size:36px;
font-weight:bold;
color:black;
margin-bottom:30px;
max-width:900px;
}

/* OPTIONS */

.option{
background:yellow;
color:black;
font-size:28px;
padding:18px;
margin:10px auto;
border-radius:12px;
border:none;
width:90%;
max-width:600px;
cursor:pointer;
display:block;
}

.option:hover{
transform:scale(1.02);
}

.correct{
background:#2e7d32;
color:white;
}

.incorrect{
background:#c62828;
color:white;
}

/* BUTTONS */

.controlBtn{
font-size:22px;
padding:14px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.check{background:#1976d2;color:white;}
.show{background:#6a1b9a;color:white;}
.skip{background:#9e9e9e;color:white;}

/* BEAKER */

#beakerContainer{
width:120px;
height:420px;
border:5px solid black;
border-bottom:12px solid black;
border-radius:10px 10px 20px 20px;
position:relative;
background:white;
}

#liquid{
position:absolute;
bottom:0;
width:100%;
height:0%;
background:#4fc3f7;
transition:height 0.5s;
}

#mlLabel{
margin-top:10px;
font-size:22px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>Chemistry Challenge</h1>

<div id="gameArea">

<div>

<div id="question"></div>

<div id="options"></div>

<div>

<button class="controlBtn check" onclick="checkAnswer()">Check Answer</button>

<button class="controlBtn show" onclick="showAnswer()">Show Answer</button>

<button class="controlBtn skip" onclick="nextQuestion()">Skip Question</button>

</div>

</div>

<div>

<div id="beakerContainer">
<div id="liquid"></div>
</div>

<div id="mlLabel">0 mL</div>

</div>

</div>

<script>

/* QUESTIONS */

const questions=[

{
q:"What is the chemical symbol for Carbon?",
options:["C","Ca","Co"],
answer:0
},

{
q:"What type of bond forms when electrons are shared?",
options:["Ionic bond","Covalent bond","Metallic bond"],
answer:1
},

{
q:"What is the pH of pure water?",
options:["7","1","14"],
answer:0
},

{
q:"What gas do plants use in photosynthesis?",
options:["Oxygen","Carbon dioxide","Nitrogen"],
answer:1
}

]

let current=0
let selected=null
let ml=0

/* LOAD QUESTION */

function loadQuestion(){

selected=null

let q=questions[current]

document.getElementById("question").innerText=q.q

let container=document.getElementById("options")
container.innerHTML=""

q.options.forEach((opt,i)=>{

let btn=document.createElement("button")
btn.className="option"
btn.innerText=opt

btn.onclick=function(){

document.querySelectorAll(".option").forEach(b=>b.style.border="none")

btn.style.border="4px solid black"

selected=i

}

container.appendChild(btn)

})

}

/* CHECK ANSWER */

function checkAnswer(){

if(selected===null) return

let q=questions[current]

let buttons=document.querySelectorAll(".option")

buttons[q.answer].classList.add("correct")

if(selected!==q.answer){

buttons[selected].classList.add("incorrect")

}else{

addLiquid()

}

}

/* SHOW ANSWER */

function showAnswer(){

let q=questions[current]

let buttons=document.querySelectorAll(".option")

buttons[q.answer].classList.add("correct")

}

/* NEXT QUESTION */

function nextQuestion(){

current++

if(current>=questions.length){
current=0
}

loadQuestion()

}

/* BEAKER FILL */

function addLiquid(){

ml+=10

if(ml>400) ml=400

let percent=(ml/400)*100

document.getElementById("liquid").style.height=percent+"%"

document.getElementById("mlLabel").innerText=ml+" mL"

}

/* START */

loadQuestion()

</script>

</body>
</html>
