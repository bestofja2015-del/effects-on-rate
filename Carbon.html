<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f4f8;
text-align:center;
margin:0;
padding:20px;
}

#container{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

#question{
font-size:36px;
font-weight:bold;
color:black;
margin-bottom:30px;
max-width:800px;
}

.option{
background:yellow;
color:black;
font-size:26px;
padding:16px;
margin:10px auto;
border-radius:10px;
border:none;
width:90%;
max-width:600px;
cursor:pointer;
display:block;
}

.option:hover{
transform:scale(1.02);
}

.correct{background:#2e7d32;color:white;}
.wrong{background:#c62828;color:white;}

button{
font-size:20px;
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

#check{background:#1976d2;color:white;}
#show{background:#6a1b9a;color:white;}
#skip{background:#9e9e9e;color:white;}

#beaker{
width:120px;
height:420px;
border:5px solid black;
border-bottom:12px solid black;
border-radius:10px 10px 20px 20px;
position:relative;
background:white;
}

#liquid{
position:absolute;
bottom:0;
width:100%;
height:0%;
background:#4fc3f7;
transition:height 0.5s;
}

#ml{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

</style>
</head>

<body>

<h1>Chemistry Quiz</h1>

<div id="container">

<div>

<div id="question"></div>

<div id="options"></div>

<div>
<button id="check" onclick="checkAnswer()">Check Answer</button>
<button id="show" onclick="showAnswer()">Show Answer</button>
<button id="skip" onclick="nextQuestion()">Skip Question</button>
</div>

</div>

<div>
<div id="beaker">
<div id="liquid"></div>
</div>
<div id="ml">0 mL</div>
</div>

</div>

<script>

const questions=[

{q:"Natural gas mainly contains:",o:["Methane","Propane","Butane","Ethane"],a:0},
{q:"Natural gas mainly contains:",o:["Methane","Propane","Butane","Ethane"],a:0},
{q:"Which type of cracking uses a catalyst?",o:["Thermal cracking","Catalytic cracking","Steam cracking","Natural cracking"],a:1},
{q:"Which compound belongs to the alcohol homologous series?",o:["CH3COOH","C2H4","C2H5OH","C3H8"],a:2},
{q:"Structural isomerism means:",o:["Same formula different structure","Same structure different formula","Different formula same structure","Same mass different atoms"],a:0},
{q:"Hydrogenation of alkenes produces:",o:["Alcohol","Alkane","Acid","Ester"],a:1},
{q:"Hydrogenation of alkenes produces:",o:["Alcohol","Alkane","Acid","Ester"],a:1},
{q:"General formula for alkenes:",o:["CnH2n","CnH2n+2","CnH2n-2","CnH3n"],a:0},
{q:"Hydration of an alkene produces:",o:["Alcohol","Alkane","Ketone","Acid"],a:0},
{q:"Structural isomerism means:",o:["Same formula different structure","Same structure different formula","Different formula same structure","Same mass different atoms"],a:0},
{q:"General formula for alkenes:",o:["CnH2n","CnH2n+2","CnH2n-2","CnH3n"],a:0},
{q:"Which process breaks long hydrocarbon chains into smaller ones?",o:["Cracking","Polymerisation","Hydration","Neutralisation"],a:0},
{q:"Hydration of an alkene produces:",o:["Alcohol","Alkane","Ketone","Acid"],a:0},
{q:"Which type of cracking uses a catalyst?",o:["Thermal cracking","Catalytic cracking","Steam cracking","Natural cracking"],a:1},
{q:"Which petroleum fraction is mainly used as fuel for cars?",o:["Bitumen","Gasoline","Lubricating oil","Refinery gas"],a:1},
{q:"Lubricating oil is mainly used for:",o:["Road surfacing","Reducing friction in engines","Cooking fuel","Plastic manufacture"],a:1},
{q:"Which process breaks long hydrocarbon chains into smaller ones?",o:["Cracking","Polymerisation","Hydration","Neutralisation"],a:0},
{q:"General formula for alkanes:",o:["CnH2n","CnH2n+2","CnH2n-2","CnHn"],a:1},
{q:"General formula for alkenes:",o:["CnH2n","CnH2n+2","CnH2n-2","CnH3n"],a:0},
{q:"Petroleum is separated into fractions using:",o:["Crystallisation","Filtration","Fractional distillation","Evaporation"],a:2},
{q:"Which type of cracking uses a catalyst?",o:["Thermal cracking","Catalytic cracking","Steam cracking","Natural cracking"],a:1},
{q:"Carbon atoms normally form how many bonds?",o:["2","3","4","6"],a:2},
{q:"Reaction most common for alkanes:",o:["Addition","Substitution","Neutralisation","Hydration"],a:1},
{q:"Which type of cracking uses a catalyst?",o:["Thermal cracking","Catalytic cracking","Steam cracking","Natural cracking"],a:1},
{q:"Natural gas mainly contains:",o:["Methane","Propane","Butane","Ethane"],a:0},
{q:"Which type of cracking uses a catalyst?",o:["Thermal cracking","Catalytic cracking","Steam cracking","Natural cracking"],a:1},
{q:"Structural isomerism means:",o:["Same formula different structure","Same structure different formula","Different formula same structure","Same mass different atoms"],a:0},
{q:"Which compound belongs to the alcohol homologous series?",o:["CH3COOH","C2H4","C2H5OH","C3H8"],a:2},
{q:"Lubricating oil is mainly used for:",o:["Road surfacing","Reducing friction in engines","Cooking fuel","Plastic manufacture"],a:1},
{q:"Natural gas mainly contains:",o:["Methane","Propane","Butane","Ethane"],a:0},

{q:"Name the alkane shown below: C-C-C",o:["Propane","Butane","Pentane","Hexane","Heptane","Octane"],a:0},
{q:"Name the alkane shown below: C-C-C-C-C",o:["Propane","Butane","Pentane","Hexane","Heptane","Octane"],a:2},
{q:"Name the alkane shown below: C-C-C-C",o:["Propane","Butane","Pentane","Hexane","Heptane","Octane"],a:1},
{q:"Name the alkane shown below: C-C-C-C-C",o:["Propane","Butane","Pentane","Hexane","Heptane","Octane"],a:2},
{q:"Name the alkane shown below: C-C-C-C-C",o:["Propane","Butane","Pentane","Hexane","Heptane","Octane"],a:2},
{q:"Name the alkane shown below: C-C-C-C",o:["Propane","Butane","Pentane","Hexane","Heptane","Octane"],a:1},
{q:"Name the alkane shown below: C-C-C",o:["Propane","Butane","Pentane","Hexane","Heptane","Octane"],a:0},
{q:"Name the alkane shown below: C-C-C-C-C-C",o:["Propane","Butane","Pentane","Hexane","Heptane","Octane"],a:3},
{q:"Name the alkane shown below: C-C-C-C-C-C",o:["Propane","Butane","Pentane","Hexane","Heptane","Octane"],a:3},
{q:"Name the alkane shown below: C-C-C-C",o:["Propane","Butane","Pentane","Hexane","Heptane","Octane"],a:1}

]

let current=0
let selected=null
let ml=0

function loadQuestion(){

selected=null

let q=questions[current]

document.getElementById("question").innerText="Q"+(current+1)+". "+q.q

let box=document.getElementById("options")
box.innerHTML=""

q.o.forEach((opt,i)=>{

let btn=document.createElement("button")
btn.className="option"
btn.innerText=opt

btn.onclick=function(){

document.querySelectorAll(".option").forEach(b=>b.style.border="none")
btn.style.border="4px solid black"
selected=i

}

box.appendChild(btn)

})

}

function checkAnswer(){

if(selected===null) return

let q=questions[current]

let buttons=document.querySelectorAll(".option")

buttons[q.a].classList.add("correct")

if(selected!==q.a){

buttons[selected].classList.add("wrong")

}else{

addLiquid()

}

}

function showAnswer(){

let q=questions[current]
let buttons=document.querySelectorAll(".option")
buttons[q.a].classList.add("correct")

}

function nextQuestion(){

current++

if(current>=questions.length) current=0

loadQuestion()

}

function addLiquid(){

ml+=10
if(ml>400) ml=400

let percent=(ml/400)*100

document.getElementById("liquid").style.height=percent+"%"
document.getElementById("ml").innerText=ml+" mL"

}

loadQuestion()

</script>

</body>
</html>
