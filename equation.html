<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
flex-direction:column;
align-items:center;
margin:0;
}

h1{
margin-top:15px;
font-size:32px;
text-shadow:0 0 10px cyan;
}

#instructions{
max-width:1000px;
background:#111;
padding:15px;
border-radius:10px;
margin:10px;
box-shadow:0 0 10px cyan;
}

#gameContainer{
width:95%;
max-width:1000px;
background:#111;
padding:20px;
border-radius:12px;
box-shadow:0 0 20px #00ffff;
}

#levelTitle{
font-size:18px;
margin-bottom:10px;
text-align:center;
}

.equation{
display:flex;
justify-content:center;
align-items:center;
flex-wrap:nowrap;
gap:8px;
font-size:22px;
margin:15px;
}

.dropzone{
width:120px;
height:50px;
border:2px dashed white;
display:flex;
align-items:center;
justify-content:center;
border-radius:6px;
background:#222;
}

.correct{
background:#00ff66;
color:black;
}

.incorrect{
background:#ff0044;
color:white;
}

.bottomContainer{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
gap:6px;
}

/* DRAG CARDS (NEON BLUE) */

.dragItem{
padding:8px 12px;
border-radius:6px;
cursor:grab;
color:white;
font-weight:bold;
background:#0066ff;
border:1px solid #00ccff;
box-shadow:0 0 8px #00ccff;
}

/* BLACK WHITE CONTROL BUTTONS */

button{
padding:10px 18px;
margin:6px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
background:black;
color:white;
border:2px solid white;
transition:0.2s;
}

button:hover{
background:white;
color:black;
transform:scale(1.05);
}

#feedback{
margin-top:10px;
font-size:18px;
text-align:center;
height:25px;
}

</style>
