<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemical Equation Matching Game</title>
<style>
body { font-family: Arial, sans-serif; background-color: #f3f3f3; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
h1 { text-align: center; margin-top: 20px; }
#gameContainer { width: 95%; max-width: 1100px; background-color: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); margin-top: 20px; }
.equation { display: flex; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
.dropzone { min-width: 100px; height: 50px; border: 2px dashed #888; margin: 0 5px; display: flex; align-items: center; justify-content: center; font-size: 18px; background-color: #f9f9f9; }
.dragItem { display: inline-block; padding: 10px 15px; margin: 5px; background-color: #6c9ef8; color: #fff; border-radius: 5px; cursor: grab; user-select: none; }
.bottomContainer { display: flex; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
button { margin: 5px; padding: 10px 20px; font-size: 16px; border: none; border-radius: 5px; background-color: #28a745; color: #fff; cursor: pointer; }
button:hover { background-color: #218838; }
#feedback { margin-top: 10px; font-size: 16px; color: red; height: 20px; }
</style>
</head>
<body>

<h1>Chemical Equation Matching Game</h1>
<div id="gameContainer">
    <div id="levelTitle">Level 1</div>
    <div class="equation" id="equation"></div>
    <div class="bottomContainer" id="bottomContainer"></div>
    <div id="feedback"></div>
    <button id="checkButton">Check Answer</button>
    <button id="skipButton">Skip Question</button>
    <button id="showClueButton">Show Clue</button>
    <button id="showAnswerButton">Show Answer</button>
</div>

<script>
const elements = [
    'H', 'He', 'Li', 'Be', 'B', 'C', 'N', 'O', 'F', 'Ne',
    'Na', 'Mg', 'Al', 'Si', 'P', 'S', 'Cl', 'Ar', 'K', 'Ca',
    'Sc', 'Ti', 'V', 'Cr', 'Mn', 'Fe', 'Co', 'Ni', 'Cu', 'Zn',
    'Ga', 'Ge', 'As', 'Se', 'Br', 'Kr', 'Rb', 'Sr', 'Y', 'Zr'
];
const stateSymbols = ['(s)', '(l)', '(g)', '(aq)'];

const levels = [
    { scenario: 'Hydrogen reacts with Oxygen to form water', correct: ['H2(g)', 'O2(g)', 'H2O(l)'], clue: 'Gas + Gas → Liquid' },
    { scenario: 'Sodium reacts with Chlorine to form sodium chloride', correct: ['Na(s)', 'Cl2(g)', 'NaCl(s)'], clue: 'Metal + Gas → Salt' },
    { scenario: 'Potassium reacts with water', correct: ['K(s)', 'H2O(l)', 'KOH(aq)', 'H2(g)'], clue: 'Metal + Water → Base + Gas' },
    { scenario: 'Hydrochloric acid reacts with sodium hydroxide', correct: ['HCl(aq)', 'NaOH(aq)', 'NaCl(aq)', 'H2O(l)'], clue: 'Acid + Base → Salt + Water' },
    { scenario: 'Sulfur reacts with oxygen', correct: ['S(s)', 'O2(g)', 'SO2(g)'], clue: 'Nonmetal + Gas → Gas' }
];

let currentLevel = 0;

function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

function loadLevel(level) {
    const levelData = levels[level];
    document.getElementById('levelTitle').innerText = 'Level ' + (level + 1) + ': ' + levelData.scenario;

    // Build equation dynamically based on correct answers
    const equationDiv = document.getElementById('equation');
    equationDiv.innerHTML = '';
    levelData.correct.forEach((_, i) => {
        const zone = document.createElement('div');
        zone.className = 'dropzone';
        zone.dataset.index = i;
        zone.textContent = '____';
        zone.addEventListener('dragover', e => e.preventDefault());
        zone.addEventListener('drop', dropItem);
        equationDiv.appendChild(zone);
        if (i === Math.floor(levelData.correct.length/2)-1) equationDiv.appendChild(document.createTextNode(' --> '));
        else if (i < levelData.correct.length-1) equationDiv.appendChild(document.createTextNode(' + '));
    });

    // Generate 20 bottom options
    const bottomContainer = document.getElementById('bottomContainer');
    bottomContainer.innerHTML = '';
    let bottomItems = [...levelData.correct];
    while (bottomItems.length < 20) {
        const el = elements[Math.floor(Math.random()*elements.length)];
        const st = stateSymbols[Math.floor(Math.random()*stateSymbols.length)];
        const formula = el + st;
        if (!bottomItems.includes(formula)) bottomItems.push(formula);
    }
    shuffle(bottomItems);
    bottomItems.forEach(item => {
        const div = document.createElement('div');
        div.className = 'dragItem';
        div.textContent = item;
        div.draggable = true;
        div.addEventListener('dragstart', dragStart);
        bottomContainer.appendChild(div);
    });

    document.getElementById('feedback').innerText = '';
}

let draggedItem = null;
function dragStart(e) { draggedItem = e.target; }
function dropItem(e) {
    e.preventDefault();
    if (draggedItem) {
        e.target.textContent = draggedItem.textContent;
        draggedItem.remove();
        draggedItem = null;
    }
}

// Buttons
document.getElementById('checkButton').addEventListener('click', () => {
    const dropzones = document.querySelectorAll('.dropzone');
    const correct = levels[currentLevel].correct;
    let allCorrect = true;
    dropzones.forEach((zone, i) => {
        if(zone.textContent !== correct[i]) allCorrect = false;
    });
    const feedback = document.getElementById('feedback');
    if(allCorrect) {
        feedback.style.color = 'green';
        feedback.textContent = 'Correct! Moving to next level...';
        currentLevel++;
        if(currentLevel < levels.length) setTimeout(() => loadLevel(currentLevel), 1500);
        else setTimeout(() => feedback.textContent = 'Congratulations! You completed all levels.', 1500);
    } else {
        feedback.style.color = 'red';
        feedback.textContent = 'Some answers are incorrect. Try again.';
    }
});

document.getElementById('skipButton').addEventListener('click', () => {
    currentLevel++;
    if(currentLevel < levels.length) loadLevel(currentLevel);
    else document.getElementById('feedback').textContent = 'You have completed all levels.';
});

document.getElementById('showClueButton').addEventListener('click', () => {
    alert(levels[currentLevel].clue);
});

document.getElementById('showAnswerButton').addEventListener('click', () => {
    document.querySelectorAll('.dropzone').forEach((zone, i) => {
        zone.textContent = levels[currentLevel].correct[i];
    });
    const feedback = document.getElementById('feedback');
    feedback.style.color = 'blue';
    feedback.textContent = 'Answer shown.';
});

// Start game
loadLevel(currentLevel);
</script>

</body>
</html>
</script>

</body>
</html>
